# Accept-risk for vulnerabilities we cannot patch downstream right now.
#
# Two upstream components that can't be bumped here:
#  - CPython 3.12.13 (base image): CVE-2026-3644 / 4224 / 7210 / 9669 (high) plus mediums,
#    waiting on a patched python base image release.
#  - pillow 11.3.0: GHSA-cfh3-3jmp-rvhc / GHSA-pwv6-vv43-88gr / GHSA-whj4-6x5x-4v2j (high)
#    are fixed in pillow 12.1.1+, but moviepy hard-pins pillow < 12.0 so it can't be upgraded.
# The findings stay visible in the Security tab (SARIF is still uploaded).
# Revisit when a patched python base ships and moviepy allows pillow >= 12
# (or moviepy is replaced with direct ffmpeg calls).
ignore:
  - package:
      name: python
      type: binary
  - package:
      name: pillow
      type: python
